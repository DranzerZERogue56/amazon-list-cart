<!DOCTYPE html>
<!-- Open this file in any browser, then click each "Download" button to save
     the required extension icons as PNG files in this same folder. -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Generate Extension Icons</title>
<style>
  body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
  h2   { margin-bottom: 16px; }
  .row { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.12); text-align: center; }
  canvas { display: block; margin: 0 auto 8px; image-rendering: pixelated; }
  button { margin-top: 6px; padding: 6px 14px; background: #FF9900; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
  p.note { color: #555; font-size: 13px; max-width: 480px; line-height: 1.6; }
</style>
</head>
<body>
<h2>Amazon List Auto-Cart — Icon Generator</h2>
<p class="note">
  Click each <strong>Download</strong> button, then rename / move the saved PNG to
  <code>icons/icon{SIZE}.png</code> in your extension folder.
</p>
<div class="row" id="row"></div>
<script>
const SIZES = [16, 48, 128];

function drawIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const s = size;

  // Background
  ctx.fillStyle = '#131921';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.15);
  ctx.fill();

  // Cart body
  const lw = Math.max(1, s * 0.07);
  ctx.strokeStyle = '#FF9900';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const ox = s * 0.08, oy = s * 0.14;
  const cw = s * 0.66, ch = s * 0.36;

  // Handle
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(ox + s * 0.18, oy);
  ctx.lineTo(ox + s * 0.26, oy + ch * 0.45);
  ctx.stroke();

  // Cart box
  ctx.beginPath();
  ctx.moveTo(ox + s * 0.26, oy + ch * 0.45);
  ctx.lineTo(ox + s * 0.26 + cw, oy + ch * 0.45);
  ctx.lineTo(ox + s * 0.26 + cw - s * 0.1, oy + ch * 0.45 + ch);
  ctx.lineTo(ox + s * 0.26 + s * 0.06, oy + ch * 0.45 + ch);
  ctx.closePath();
  ctx.stroke();

  // Wheels
  const wr = Math.max(1.5, s * 0.07);
  ctx.fillStyle = '#FF9900';
  ctx.beginPath();
  ctx.arc(ox + s * 0.32 + s * 0.04, oy + ch * 0.45 + ch + wr * 1.2, wr, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ox + s * 0.26 + cw - s * 0.12, oy + ch * 0.45 + ch + wr * 1.2, wr, 0, Math.PI * 2);
  ctx.fill();

  // Checkmark (bottom-right badge)
  const bx = s * 0.56, by = s * 0.52, br = s * 0.24;
  ctx.fillStyle = '#00A650';
  ctx.beginPath();
  ctx.arc(bx + br, by + br, br, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = Math.max(1, s * 0.06);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bx + br * 0.4, by + br);
  ctx.lineTo(bx + br * 0.85, by + br * 1.55);
  ctx.lineTo(bx + br * 1.65, by + br * 0.5);
  ctx.stroke();

  return c;
}

const row = document.getElementById('row');
SIZES.forEach(size => {
  const card = document.createElement('div');
  card.className = 'card';

  const canvas = drawIcon(size);
  // Display at 2x for small sizes
  const display = size < 48 ? size * 3 : size;
  canvas.style.width  = display + 'px';
  canvas.style.height = display + 'px';

  const label = document.createElement('div');
  label.textContent = `icon${size}.png`;

  const btn = document.createElement('button');
  btn.textContent = 'Download';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `icon${size}.png`;
    a.click();
  };

  card.appendChild(canvas);
  card.appendChild(label);
  card.appendChild(btn);
  row.appendChild(card);
});
</script>
</body>
</html>
