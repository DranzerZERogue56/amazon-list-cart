name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Package the extension + generate icons ──────────────────────────────
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow (icon generation)
        run: pip install Pillow

      - name: Generate icons
        run: python installer/generate_icons.py

      - name: Zip extension folder
        run: |
          cd extension
          zip -r ../extension.zip . -x "*/make-icons.html"

      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

  # ── 2. Windows installer .exe ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "AmazonListAutoCart-Installer"
          installer/installer.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/AmazonListAutoCart-Installer.exe

  # ── 3. macOS installer .app ────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .app
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "AmazonListAutoCart-Installer"
          installer/installer.py

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r AmazonListAutoCart-Installer-mac.zip "AmazonListAutoCart-Installer.app"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/AmazonListAutoCart-Installer-mac.zip

  # ── 4. Create GitHub Release with all artifacts ────────────────────────────
  release:
    needs: [package-extension, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            extension.zip
            AmazonListAutoCart-Installer.exe
            AmazonListAutoCart-Installer-mac.zip
